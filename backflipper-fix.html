<html lang="en-us"><head></head><body><module>
    <moduleprefs title="classroom">
    <content type="html"><!--[CDATA[
    
    
    <!DOCTYPE html-->
    
    
        <meta charset="utf-8">
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <style>
            html, body {
                width: 100%;
                height: 100%;
                padding: 0px;
                margin: 0px;
                overflow: hidden;
                background: #000;
                -webkit-touch-callout: none;
                -webkit-user-select: none;
                user-select: none;
                -webkit-tap-highlight-color: rgba(0,0,0,0);
            }
            .fullscreen {
                background: #000000;
                width: 100%;
                height: 100%;
                position: absolute;
                top: 0px;
                left: 0px;
            }
            #loading-cover {
                z-index: 1;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            #unity-loading-bar {
                flex: 1 1 auto;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            #unity-progress-bar-empty {
                width: 30%;
                height: 12px;
                margin: 10px 20px 20px 10px;
                text-align: left;
                background: #202020;
            }
            #unity-progress-bar-full {
                width: 0%;
                height: 100%;
                background: #007EBD;
            }
        </style>
        <!-- Tüm YSDK Hatalarını Kökten Çözen Gelişmiş Mock Katmanı -->
        <script>
            if (typeof YaGames === 'undefined') {
                window.YaGames = {
                    init: function() {
                        return new Promise((resolve) => {
                            console.log("SDK Mock: Initializing system...");
                            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
                            resolve({
                                deviceInfo: {
                                    type: isMobile ? 'mobile' : 'desktop',
                                    isMobile: () => isMobile,
                                    isDesktop: () => !isMobile,
                                    isTablet: () => false,
                                    isTV: () => false
                                },
                                environment: {
                                    app: { id: '12345' },
                                    browser: { lang: 'tr' },
                                    i18n: { lang: 'tr', tld: 'com' }
                                },
                                features: { 
                                    LoadingAPI: { ready: () => console.log("SDK Mock: Loading API Ready") }, 
                                    GameplayAPI: { start: () => {}, stop: () => {} } 
                                },
                                adv: { 
                                    showFullscreenAdv: (c) => { if(c.callbacks?.onClose) c.callbacks.onClose(); }, 
                                    showRewardedVideo: (c) => { if(c.callbacks?.onClose) c.callbacks.onClose(); } 
                                },
                                getPlayer: () => Promise.resolve({ 
                                    getName: () => "Player",
                                    getUniqueID: () => "mock-uid-123",
                                    getPhoto: (size) => "",
                                    isAuthorized: () => true, // Hata veren kritik fonksiyon
                                    getMode: () => "lite",
                                    setData: () => Promise.resolve(),
                                    getData: () => Promise.resolve({}),
                                    setStats: () => Promise.resolve(),
                                    getStats: () => Promise.resolve({})
                                }),
                                getStorage: () => Promise.resolve({
                                    getItem: () => null,
                                    setItem: () => Promise.resolve()
                                })
                            });
                        });
                    }
                };
            }
        </script>
    
    
        <canvas id="canvas" class="fullscreen" width="2885" height="1317" style="cursor: default;"></canvas>
        <div id="loading-cover" class="fullscreen" style="display: none;">
            <div id="unity-loading-bar">
                <div id="unity-progress-bar-empty">
                    <div id="unity-progress-bar-full" style="width: 100%;"></div>
                </div>
            </div>
        </div>
    
        <script>
            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                let meta = document.createElement('meta');
                meta.name = 'viewport';
                meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
                document.getElementsByTagName('head')[0].appendChild(meta);
            }
    
            let canvas = document.getElementById('canvas');
            let loadingCover = document.getElementById('loading-cover');
            let progressBarFull = document.getElementById('unity-progress-bar-full');
    
            document.addEventListener('contextmenu', event => event.preventDefault());
    
            function FocusGame() {
                window.focus();
                canvas.focus();
            }
    
            window.addEventListener('pointerdown', FocusGame);
            window.addEventListener('touchstart', FocusGame);
    
            let v_ysdk;
            let v_player;
            let v_game_instance;
            let v_sdk_init = false;
    
            // SDK Fonksiyonları - Güvenli hale getirildi
            function GameReadyNow(){ if(v_ysdk) v_ysdk.features.LoadingAPI?.ready(); }
            function GameplayStart(){ if(v_ysdk) v_ysdk.features.GameplayAPI?.start(); }
            function GameplayStop(){ if(v_ysdk) v_ysdk.features.GameplayAPI?.stop(); }
    
            function FullAdShow() {
                if(!v_ysdk) return;
                v_ysdk.adv.showFullscreenAdv({
                    callbacks: {
                        onOpen: () => v_game_instance?.SendMessage('YAds', 'FullscreenAdOpen'),
                        onClose: () => v_game_instance?.SendMessage('YAds', 'FullscreenAdClosed'),
                        onError: () => v_game_instance?.SendMessage('YAds', 'FullscreenAdError')
                    }
                });
            }
    
            function RewardAdShow() {
                if(!v_ysdk) return;
                v_ysdk.adv.showRewardedVideo({
                    callbacks: {
                        onOpen: () => v_game_instance?.SendMessage('YAds', 'RewardAdOpen'),
                        onClose: () => v_game_instance?.SendMessage('YAds', 'RewardAdClosed'),
                        onRewarded: () => v_game_instance?.SendMessage('YAds', 'RewardAdRewarded'),
                        onError: () => v_game_instance?.SendMessage('YAds', 'RewardAdError')
                    }
                });
            }
    
            // SDK ve Unity Başlatma Süreci
            YaGames.init().then(ysdk => {
                v_ysdk = ysdk;
                v_ysdk.getPlayer({ scopes: false }).then(_player => {
                    v_player = _player;
                    v_sdk_init = true;
    
                    let unityLoader = document.createElement("script");
                    unityLoader.src = 'https://cdn.jsdelivr.net/gh/emrsdahclassroom/zefli77@main/Build/Build.loader.js';
                    unityLoader.onload = () => {
                        createUnityInstance(canvas, {
                            dataUrl: 'https://cdn.jsdelivr.net/gh/emrsdahclassroom/zefli77@f5a52b6/Build/Build.data.unityweb',
                            frameworkUrl: 'https://cdn.jsdelivr.net/gh/emrsdahclassroom/zefli77@f5a52b6/Build/Build.framework.js.unityweb',
                            codeUrl: 'https://cdn.jsdelivr.net/gh/emrsdahclassroom/zefli77@f5a52b6/Build/Build.wasm.unityweb',
                            streamingAssetsUrl: 'StreamingAssets',
                            companyName: 'new',
                            productName: 'new',
                            productVersion: '0.0.0.9',
                        }, (progress) => {
                            progressBarFull.style.width = `${progress * 100}%`;
                        }).then((unityInstance) => {
                            v_game_instance = unityInstance;
                            loadingCover.style.display = "none";
                            canvas.focus();
                        }).catch(console.error);
                    };
                    document.body.appendChild(unityLoader);
                }).catch(() => {
                    // Oyuncu çekilemezse dahi oyunu yükle
                    let loader = document.createElement("script");
                    loader.src = 'https://cdn.jsdelivr.net/gh/emrsdahclassroom/zefli77@main/Build/Build.loader.js';
                    document.body.appendChild(loader);
                });
            });
        </script>
        
        <!-- Sticky Bottom Center Ad (728x90) with Smooth Slide-Out and Reappearance -->
    <style>
      /* Container: Bottom center, fixed, with overflow hidden */
      #ad-container {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: min(728px, calc(100% - 20px)); /* 728px, 10px margin on mobile */
        height: 90px;
        background: rgba(0, 0, 0, 0.90);
        display: none;
        z-index: 99999;
        border-radius: 0; /* Sharp corners */
        overflow: hidden;
        box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.45);
        box-sizing: border-box;
        transition: transform 0.5s ease-in-out; /* Smooth slide-in/out animation */
      }
    
      /* Slide-out animation */
      #ad-container.hidden {
        transform: translate(-50%, 100%); /* Slide down out of view */
      }
    
      #ad-iframe {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 745px; /* Updated width */
        height: 90px; /* Updated height */
        border: 0;
        display: block;
        overflow: hidden;
        pointer-events: auto;
        box-sizing: content-box;
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      #ad-iframe::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }
    
      /* Close button with arrow */
      #close-ad {
        position: absolute;
        top: 6px;
        right: 8px;
        background: #ff4d4d;
        color: #fff;
        border: none;
        padding: 5px 9px;
        font-size: 13px;
        border-radius: 4px;
        cursor: not-allowed;
        opacity: 0.72;
        z-index: 100000;
        display: flex;
        align-items: center;
      }
      #close-ad.enabled {
        cursor: pointer;
        opacity: 1;
      }
      #close-ad::before {
        content: '↓'; /* Down arrow for bottom ad */
        margin-right: 4px;
      }
    
      /* Right mask for scrollbar */
      #ad-right-mask {
        position: absolute;
        top: 0;
        right: 0;
        width: 12px;
        height: 100%;
        pointer-events: none;
        background: linear-gradient(to right, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.9));
        z-index: 99999;
      }
    
      /* Mobile adjustments */
      @media (max-width: 440px) {
        #ad-container {
          width: calc(100% - 12px);
          left: 50%;
          transform: translateX(-50%);
          border-radius: 0; /* Sharp corners on mobile */
        }
        #ad-iframe {
          width: 728px;
        }
      }
    </style>
    
    <div id="ad-container" aria-hidden="false" role="dialog" aria-label="Advertisement" style="display: block;">
      <iframe id="ad-iframe" src="https://script.google.com/macros/s/AKfycbw60Tp6nuqThxAuU8ZN1JIuPtjHoW2Uqq3fQy0CvrycN0O2AQwhRT5EDv73hh2FhXEF/exec" width="768px" height="95px" scrolling="no" frameborder="0" sandbox="allow-scripts allow-popups allow-same-origin"></iframe>
      <button id="close-ad" disabled="">Close (9)</button>
      <div id="ad-right-mask"></div>
    </div>
    
    <script>
      (function () {
        const showDelay = 2000; // 2 seconds delay before first show
        const countdownStart = 12; // 12 seconds countdown
        const reappearDelay = 150000; // 25 seconds before reappearance
        const adContainer = document.getElementById('ad-container');
        const closeBtn = document.getElementById('close-ad');
    
        function showAd() {
          // Show ad with smooth slide-in
          adContainer.style.display = 'block';
          adContainer.classList.remove('hidden');
          adContainer.setAttribute('aria-hidden', 'false');
    
          // Start countdown
          let timeLeft = countdownStart;
          closeBtn.textContent = `Close (${timeLeft})`;
          closeBtn.disabled = true;
          closeBtn.classList.remove('enabled');
    
          const t = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
              closeBtn.textContent = `Close (${timeLeft})`;
            } else {
              clearInterval(t);
              closeBtn.disabled = false;
              closeBtn.classList.add('enabled');
              closeBtn.textContent = 'Close ↓';
            }
          }, 1000);
        }
    
        // Initial ad show
        setTimeout(showAd, showDelay);
    
        // Close with animation and schedule reappearance
        closeBtn.addEventListener('click', () => {
          if (closeBtn.disabled) return;
          adContainer.classList.add('hidden');
          adContainer.setAttribute('aria-hidden', 'true');
          // Schedule reappearance without removing or reloading iframe
          setTimeout(showAd, reappearDelay);
        });
      })();
    </script>
